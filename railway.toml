[build]
# Use the Dockerfile in the repo root — handles Node + Python + SWI-Prolog
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# server.js is launched from /app/webapp (set as WORKDIR in the Dockerfile)
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
