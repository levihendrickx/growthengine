<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growth Engine — Signing in…</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ececec;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 400px;
      width: calc(100vw - 32px);
      text-align: center;
      box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 12px 28px rgba(0,0,0,.12), 0 32px 60px rgba(0,0,0,.10);
    }
    .logo {
      width: 44px; height: 44px;
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
    }
    h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.015em; margin-bottom: 10px; }
    p  { font-size: 14px; color: #6b6660; line-height: 1.55; }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid #e0ddd9;
      border-top-color: #4a3aff;
      border-radius: 50%;
      margin: 24px auto 0;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #c0392b; font-size: 13.5px; margin-top: 16px; }
    .back-link {
      display: inline-block; margin-top: 20px;
      font-size: 13px; font-weight: 500; color: #4a3aff;
      text-decoration: underline; text-underline-offset: 2px; cursor: pointer;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" width="44" height="44">
      <defs>
        <linearGradient id="cb-grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"  stop-color="#818cf8"/>
          <stop offset="50%" stop-color="#4a3aff"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
      <path d="M20 3 L23 14 L33 18 L23 22 L20 33 L17 22 L7 18 L17 14 Z" fill="url(#cb-grad)"/>
    </svg>
  </div>
  <h1 id="cb-title">Signing you in…</h1>
  <p  id="cb-sub">Please wait while we verify your sign-in.</p>
  <div class="spinner" id="cb-spinner"></div>
  <p class="error-msg" id="cb-error" style="display:none"></p>
  <span class="back-link" id="cb-back" style="display:none" onclick="window.location.href='/'">
    ← Back to Growth Engine
  </span>
</div>

<script>
(async function () {
  const titleEl   = document.getElementById('cb-title');
  const subEl     = document.getElementById('cb-sub');
  const spinnerEl = document.getElementById('cb-spinner');
  const errorEl   = document.getElementById('cb-error');
  const backEl    = document.getElementById('cb-back');

  function showError(msg) {
    spinnerEl.style.display = 'none';
    titleEl.textContent     = 'Sign-in failed';
    subEl.textContent       = '';
    errorEl.textContent     = msg;
    errorEl.style.display   = '';
    backEl.style.display    = '';
  }

  try {
    // Fetch public config from the Express server
    const cfgRes = await fetch('/api/config');
    if (!cfgRes.ok) throw new Error('Could not load app config.');
    const cfg = await cfgRes.json();

    if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
      throw new Error('Supabase is not yet configured on this server.');
    }

    // Initialise client — detectSessionInUrl:true automatically exchanges
    // the OAuth code (PKCE) or magic-link token in the URL
    const sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey, {
      auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true },
    });

    // Wait for Supabase to finish the code/token exchange
    const { data: { session }, error } = await sb.auth.getSession();

    if (error) throw error;

    if (!session) {
      // Nothing in URL — could be a stale link; let the user go back
      showError('This sign-in link has expired or already been used. Please request a new one.');
      return;
    }

    // ── Create / upsert profile ─────────────────────────────────
    const user = session.user;

    const { error: profileErr } = await sb.from('profiles').upsert({
      id:            user.id,
      email:         user.email,
      full_name:     user.user_metadata?.full_name  || user.user_metadata?.name || null,
      avatar_url:    user.user_metadata?.avatar_url || user.user_metadata?.picture || null,
      auth_provider: user.app_metadata?.provider    || 'email',
      last_login_at: new Date().toISOString(),
      updated_at:    new Date().toISOString(),
    }, { onConflict: 'id' });

    if (profileErr) console.warn('[Auth callback] Profile upsert error:', profileErr.message);

    // ── Create default workspace for new users ──────────────────
    // Only create if no workspace exists yet (first login)
    const { data: existingWs } = await sb
      .from('workspace_members')
      .select('workspace_id')
      .eq('user_id', user.id)
      .limit(1);

    if (!existingWs || existingWs.length === 0) {
      const wsName = user.user_metadata?.full_name
        ? `${user.user_metadata.full_name.split(' ')[0]}'s Workspace`
        : 'My Workspace';

      const { data: ws, error: wsErr } = await sb
        .from('workspaces')
        .insert({ name: wsName, owner_user_id: user.id, plan: 'free' })
        .select()
        .single();

      if (!wsErr && ws) {
        await sb.from('workspace_members').insert({
          workspace_id: ws.id,
          user_id:      user.id,
          role:         'owner',
        });
      }
    }

    // ── Redirect to app ─────────────────────────────────────────
    window.location.replace('/?page=dashboard');

  } catch (err) {
    console.error('[Auth callback]', err);
    showError(err.message || 'Something went wrong. Please try again.');
  }
})();
</script>
</body>
</html>
