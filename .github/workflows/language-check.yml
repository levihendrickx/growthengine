name: Language check

on:
  pull_request:
    branches: [main]

jobs:
  language-check:
    name: No Dutch in changed files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Dutch in changed text files
        run: |
          set -eu

          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          # Files added or modified in this PR, restricted to text-y extensions,
          # excluding generated files and data folders.
          mapfile -t files < <(
            git diff --name-only --diff-filter=AM "$base" "$head" \
              | grep -E '\.(md|py|html|js|ts|jsx|tsx|css|txt|yml|yaml)$' \
              | grep -vE '(^|/)(node_modules|package-lock\.json|yarn\.lock|atoms/|sample_data/atoms/)' \
              | grep -vE '^docs/decisions/0004-drop-obsidian-and-switch-to-english\.md$' \
              | grep -vE '^\.github/workflows/language-check\.yml$' \
              || true
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "✅ No text files changed."
            exit 0
          fi

          # Patterns that are very Dutch and almost never appear in English.
          # Two- or three-word phrases reduce false positives on identifiers and
          # surnames. Word boundaries via grep -w / -E.
          patterns='\b(in het|in de|van de|van het|naar de|naar het|op de|op het|bij de|met de|met het|uit de|uit het|is een|als een|met een|voor een|van een|we hebben|ik heb|jij hebt|hij heeft|niet zichtbaar|afbeelding|bestand|voorbeeld|wijziging|veranderingen|werkwijze|werkstroom|doelgroep|feestdag|samenvoegen|aanpassen|toegevoegd|gewijzigd|verwijderd|nieuwe|oude|andere|gebruiker|gebruikers|alle|alleen|altijd|nooit|soms|vaak|elke|elkaar|allebei|beide|samen|zonder|tegen|achter)\b'

          found=0
          for file in "${files[@]}"; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            # Skip lines that contain an explicit override comment.
            matches=$(grep -niE "$patterns" "$file" | grep -v 'lang-ok' || true)

            if [ -n "$matches" ]; then
              echo ""
              echo "::error file=$file::Possible Dutch text"
              echo "🇳🇱 $file"
              echo "$matches" | head -10
              found=1
            fi
          done

          if [ "$found" = "1" ]; then
            echo ""
            echo "❌ Dutch content detected. The repo language is English (see ADR 0004)."
            echo "Either translate the flagged lines, or add a 'lang-ok' marker on the line if"
            echo "the match is a false positive (e.g. a quoted Dutch example you cannot rewrite)."
            exit 1
          fi

          echo "✅ No Dutch patterns detected."
